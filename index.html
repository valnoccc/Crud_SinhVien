<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            color: #1a1a1a;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .table thead {
            background-color: #f8f9fa;
        }

        .avatar-circle {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .btn-action {
            width: 35px;
            height: 35px;
            padding: 0;
            line-height: 35px;
            border-radius: 8px;
        }

        .sticky-form {
            position: sticky;
            top: 20px;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card sticky-form p-4">
                    <h5 class="fw-bold mb-4" id="formTitle"><i class="bi bi-person-plus-fill me-2"></i>Thêm Sinh Viên
                    </h5>
                    <form id="studentForm">
                        <input type="hidden" id="studentId">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Họ và tên</label>
                            <input type="text" id="name" class="form-control" placeholder="Nguyễn Văn A">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Số điện thoại</label>
                            <input type="text" id="phone" class="form-control" placeholder="090x xxx xxx">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Link Avatar</label>
                            <input type="text" id="avatar" class="form-control" placeholder="https://...">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-primary fw-bold" onclick="handleSave()">
                                <i class="bi bi-cloud-arrow-up-fill me-2"></i>Lưu thông tin
                            </button>
                            <button type="button" class="btn btn-light btn-sm" onclick="clearForm()">Làm mới</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0">Danh sách sinh viên</h5>
                        <span class="badge bg-primary-subtle text-primary rounded-pill px-3" id="totalCount">0 sinh
                            viên</span>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="studentTable">
                            <thead>
                                <tr>
                                    <th>Sinh viên</th>
                                    <th>Liên hệ</th>
                                    <th class="text-end">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_URL = 'https://698591166964f10bf2539592.mockapi.io/SinhVien';

        // Tải dữ liệu
        async function loadData() {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('totalCount').innerText = `${data.length} sinh viên`;

            const tbody = document.querySelector('#studentTable tbody');
            tbody.innerHTML = data.map(s => `
            <tr>
                <td>
                    <div class="d-flex align-items-center">
                        <img src="${s.avatar}" class="avatar-circle me-3" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}'">
                        <div>
                            <div class="fw-bold">${s.name}</div>
                            <div class="text-muted small">ID: #${s.id}</div>
                        </div>
                    </div>
                </td>
                <td>
                    <div class="small"><i class="bi bi-envelope me-1"></i>${s.email}</div>
                    <div class="small text-muted"><i class="bi bi-telephone me-1"></i>${s.phone}</div>
                </td>
                <td class="text-end">
                    <button class="btn btn-light btn-action text-warning me-1" onclick="editMode('${s.id}', '${s.name}', '${s.email}', '${s.phone}', '${s.avatar}')">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                    <button class="btn btn-light btn-action text-danger" onclick="deleteStudent('${s.id}')">
                        <i class="bi bi-trash3-fill"></i>
                    </button>
                </td>
            </tr>
        `).join('');
        }

        // Lưu / Cập nhật
        async function handleSave() {
            const id = document.getElementById('studentId').value;
            const student = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                avatar: document.getElementById('avatar').value
            };

            if (!student.name || !student.email) {
                Swal.fire('Lỗi', 'Vui lòng điền tên và email!', 'error');
                return;
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(student)
            });

            Swal.fire('Thành công', id ? 'Đã cập nhật!' : 'Đã thêm mới!', 'success');
            clearForm();
            loadData();
        }

        // Xóa với SweetAlert2
        async function deleteStudent(id) {
            const result = await Swal.fire({
                title: 'Bạn chắc chắn chứ?',
                text: "Dữ liệu sẽ không thể khôi phục!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'Đúng, xóa nó!'
            });

            if (result.isConfirmed) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                Swal.fire('Đã xóa!', 'Sinh viên đã bị loại khỏi danh sách.', 'success');
                loadData();
            }
        }

        function editMode(id, name, email, phone, avatar) {
            document.getElementById('studentId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('email').value = email;
            document.getElementById('phone').value = phone;
            document.getElementById('avatar').value = avatar;

            document.getElementById('formTitle').innerHTML = '<i class="bi bi-pencil-fill me-2 text-warning"></i>Sửa Sinh Viên';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearForm() {
            document.getElementById('studentForm').reset();
            document.getElementById('studentId').value = '';
            document.getElementById('formTitle').innerHTML = '<i class="bi bi-person-plus-fill me-2"></i>Thêm Sinh Viên';
        }

        loadData();
    </script>
</body>

</html>
